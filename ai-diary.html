<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI虚拟社区日记本 - OpenAI智能版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.8;
            font-size: 0.9rem;
        }

        /* API 配置面板 */
        .api-panel {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .api-panel h3 {
            color: white;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .api-input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .api-input-group input {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 12px;
            font-size: 0.85rem;
            background: rgba(255,255,255,0.9);
        }

        .api-input-group input:focus {
            outline: none;
            background: white;
        }

        .api-status {
            font-size: 0.8rem;
            color: #4CAF50;
            margin-top: 8px;
        }

        .api-status.error {
            color: #ff6b6b;
        }

        .control-panel {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            color: white;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .speed-control input {
            width: 200px;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
        }

        .stats span {
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 20px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .publish-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .publish-card textarea {
            width: 100%;
            min-height: 100px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 12px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
        }

        .publish-card textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .publish-btn {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
        }

        .diary-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .diary-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .diary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
            color: #666;
            font-size: 0.85rem;
        }

        .diary-content {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }

        .like-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            padding: 10px 0;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
        }

        .like-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 20px;
        }

        .like-btn:hover {
            background: #f5f5f5;
        }

        .comments-tree {
            margin-top: 15px;
        }

        .comment-item {
            margin-bottom: 12px;
            padding-left: 0;
        }

        .comment-reply {
            margin-left: 40px;
            padding-left: 15px;
            border-left: 2px solid #e0e0e0;
        }

        .comment-bubble {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 10px 12px;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .comment-body {
            flex: 1;
        }

        .comment-name {
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .comment-text {
            font-size: 0.9rem;
            line-height: 1.4;
            color: #333;
        }

        .comment-time {
            font-size: 0.7rem;
            color: #999;
            margin-top: 4px;
        }

        .comment-actions {
            margin-top: 6px;
            display: flex;
            gap: 12px;
        }

        .comment-actions button {
            background: none;
            color: #999;
            padding: 2px 8px;
            font-size: 0.7rem;
        }

        .comment-actions button:hover {
            background: #e0e0e0;
            color: #667eea;
        }

        .personality-badge {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 6px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .delete-btn:hover {
            color: #ff6b6b;
        }

        .loading-comment {
            background: #f0f0f0;
            padding: 8px 12px;
            border-radius: 12px;
            color: #999;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 600px) {
            .comment-reply {
                margin-left: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI虚拟社区 · OpenAI智能版</h1>
            <p>AI会根据你的日记内容，生成真正相关的评论</p>
        </div>

        <!-- API 配置 -->
        <div class="api-panel">
            <h3>🔑 OpenAI 配置（必填）</h3>
            <div class="api-input-group">
                <input type="password" id="apiKeyInput" placeholder="OpenAI API Key (sk-...)" autocomplete="off">
                <select id="modelSelect">
                    <option value="gpt-3.5-turbo">GPT-3.5 Turbo（快速·便宜）</option>
                    <option value="gpt-4">GPT-4（聪明·较贵）</option>
                </select>
                <button id="saveApiBtn">保存配置</button>
            </div>
            <div class="api-status" id="apiStatus">
                ⚠️ 未配置 API Key，将使用离线评论模板
            </div>
        </div>

        <div class="control-panel">
            <div class="speed-control">
                <span>⏱️ 评论速度</span>
                <input type="range" id="speedSlider" min="0" max="100" value="30">
                <span id="speedLabel">中等</span>
            </div>
            <div class="stats">
                <span>📝 <span id="diaryCount">0</span> 篇日记</span>
                <span>💬 <span id="commentCount">0</span> 条评论</span>
                <span>❤️ <span id="likeCount">0</span> 点赞</span>
            </div>
            <button id="pauseBtn">⏸️ 暂停新评论</button>
        </div>

        <div class="publish-card">
            <textarea id="diaryInput" placeholder="写下你的心情...&#10;AI会根据你的内容，生成真正相关的评论~"></textarea>
            <button class="publish-btn" id="publishBtn">📝 发布日记 · 邀请AI评论</button>
        </div>

        <div class="diary-list" id="diaryList"></div>
    </div>

    <script>
        // ==================== AI 人格定义 ====================
        const PERSONALITIES = {
            peaceful: {
                name: "🌿 平和者 · 林静",
                avatar: "🌿",
                style: "温和、包容",
                systemPrompt: `你是一个性格平和、包容、不轻易评判他人的人。你说话温和，总是试图理解他人，不会攻击或贬低。用友善、接纳的语气回复。保持简洁，一句话即可。`
            },
            cynic: {
                name: "😒 愤世者 · 老K",
                avatar: "😒",
                style: "批判、毒舌",
                systemPrompt: `你是一个愤世嫉俗、批判性很强的人。你总是怀疑一切，说话带刺，喜欢拆穿虚伪。用讽刺、怀疑的语气回复。保持简洁，一句话即可。`
            },
            pessimistic: {
                name: "🌧️ 悲观者 · 小忧",
                avatar: "🌧️",
                style: "消极、担忧",
                systemPrompt: `你是一个悲观主义者，总是看到事情不好的一面，容易焦虑和担忧。用消极、担忧的语气回复。保持简洁，一句话即可。`
            },
            optimistic: {
                name: "☀️ 积极者 · 向阳",
                avatar: "☀️",
                style: "阳光、鼓励",
                systemPrompt: `你是一个乐观主义者，永远看到希望，喜欢鼓励他人。用积极、阳光、充满正能量的语气回复。保持简洁，一句话即可。`
            },
            social: {
                name: "🎭 合群者 · 阿群",
                avatar: "🎭",
                style: "随和、跟风",
                systemPrompt: `你是一个合群的人，喜欢附和他人，不太有自己的主见。用随和、赞同的语气回复，经常说"同意"、"+1"之类的话。保持简洁，一句话即可。`
            }
        };

        const ALL_PERSONALITIES = Object.keys(PERSONALITIES);

        // ==================== 全局变量 ====================
        let diaries = [];
        let intervalId = null;
        let isPaused = false;
        let speed = 30;
        let openAIConfig = {
            apiKey: '',
            model: 'gpt-3.5-turbo',
            enabled: false
        };

        // 加载保存的配置
        function loadAPIConfig() {
            const savedKey = localStorage.getItem('openai_api_key');
            const savedModel = localStorage.getItem('openai_model');
            if (savedKey) {
                openAIConfig.apiKey = savedKey;
                openAIConfig.enabled = true;
                document.getElementById('apiKeyInput').value = '••••••••••••••••';
                document.getElementById('apiStatus').innerHTML = '✅ OpenAI 已配置，将使用 AI 生成智能评论';
                document.getElementById('apiStatus').className = 'api-status';
            }
            if (savedModel) {
                openAIConfig.model = savedModel;
                document.getElementById('modelSelect').value = savedModel;
            }
        }

        // 保存 API 配置
        function saveAPIConfig() {
            let apiKey = document.getElementById('apiKeyInput').value;
            const model = document.getElementById('modelSelect').value;
            
            if (apiKey && !apiKey.startsWith('••••')) {
                openAIConfig.apiKey = apiKey;
                localStorage.setItem('openai_api_key', apiKey);
                openAIConfig.enabled = true;
                document.getElementById('apiStatus').innerHTML = '✅ OpenAI 已配置，将使用 AI 生成智能评论';
                document.getElementById('apiStatus').className = 'api-status';
            } else if (apiKey && apiKey.startsWith('••••')) {
                // 已经配置过，保留原有key
                openAIConfig.enabled = true;
            } else {
                openAIConfig.enabled = false;
                document.getElementById('apiStatus').innerHTML = '⚠️ 未配置 API Key，将使用离线评论模板';
                document.getElementById('apiStatus').className = 'api-status error';
            }
            
            openAIConfig.model = model;
            localStorage.setItem('openai_model', model);
            
            if (apiKey && !apiKey.startsWith('••••')) {
                document.getElementById('apiKeyInput').value = '••••••••••••••••';
            }
        }

        // 调用 OpenAI API 生成评论
        async function generateAIComment(diaryContent, personalityKey, contextComment = null) {
            if (!openAIConfig.enabled || !openAIConfig.apiKey) {
                // 降级到离线模板
                return generateOfflineComment(personalityKey, contextComment);
            }
            
            const personality = PERSONALITIES[personalityKey];
            let contextText = '';
            if (contextComment) {
                contextText = `\n\n你正在回复这条评论：「${contextComment.text}」\n回复时要针对这条评论的内容。`;
            }
            
            const userPrompt = `日记内容：「${diaryContent}」${contextText}\n\n请根据日记内容，用你的性格特点写一句评论（一句话，20字以内）。`;
            
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${openAIConfig.apiKey}`
                    },
                    body: JSON.stringify({
                        model: openAIConfig.model,
                        messages: [
                            { role: 'system', content: personality.systemPrompt },
                            { role: 'user', content: userPrompt }
                        ],
                        max_tokens: 60,
                        temperature: 0.9
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    console.error('OpenAI API Error:', error);
                    return generateOfflineComment(personalityKey, contextComment);
                }
                
                const data = await response.json();
                let commentText = data.choices[0].message.content.trim();
                // 移除可能的多余引号
                commentText = commentText.replace(/^["']|["']$/g, '');
                
                return {
                    text: commentText,
                    personality: personalityKey,
                    authorName: personality.name,
                    avatar: personality.avatar
                };
            } catch (error) {
                console.error('API调用失败:', error);
                return generateOfflineComment(personalityKey, contextComment);
            }
        }

        // 离线评论模板（降级方案）
        const OFFLINE_COMMENTS = {
            peaceful: [
                "每个人都有自己独特的经历呢",
                "我理解你的感受，慢慢来~",
                "接纳一切，包括不完美的自己",
                "你说的有道理，也值得被听见",
                "生活就是这样，有起有落"
            ],
            cynic: [
                "呵，现实哪有这么简单",
                "又一个被情绪支配的",
                "天真，这世界比你想象复杂",
                "别自欺欺人了",
                "呵呵，我见得多了"
            ],
            pessimistic: [
                "唉，感觉没什么希望",
                "可是万一失败了呢？",
                "人生就是这样充满遗憾",
                "我不太敢期待什么",
                "总会出问题的吧"
            ],
            optimistic: [
                "加油！一切都会好起来！",
                "相信明天会更好~",
                "你已经很棒了！",
                "困难是暂时的！",
                "正能量满满，冲鸭！"
            ],
            social: [
                "对对对，我也这么觉得！",
                "+1，完全同意",
                "说的太对了！",
                "我也这样想过诶",
                "就是就是，太有同感了"
            ]
        };

        function generateOfflineComment(personalityKey, contextComment = null) {
            const comments = OFFLINE_COMMENTS[personalityKey] || OFFLINE_COMMENTS.peaceful;
            let text = comments[Math.floor(Math.random() * comments.length)];
            
            if (contextComment && personalityKey === 'social') {
                text = `同意！${text}`;
            } else if (contextComment && personalityKey === 'cynic' && Math.random() > 0.5) {
                text = `说得好像很有道理似的，${text.toLowerCase()}`;
            }
            
            const p = PERSONALITIES[personalityKey];
            return {
                text: text,
                personality: personalityKey,
                authorName: p.name,
                avatar: p.avatar
            };
        }

        function getRandomPersonality() {
            return ALL_PERSONALITIES[Math.floor(Math.random() * ALL_PERSONALITIES.length)];
        }

        // ==================== 数据结构 ====================
        function loadData() {
            const saved = localStorage.getItem('ai_community_diaries_v2');
            if (saved) {
                diaries = JSON.parse(saved);
                diaries = diaries.map(diary => {
                    if (!diary.comments) diary.comments = [];
                    if (diary.likes === undefined) diary.likes = 0;
                    if (!diary.lastCommentTime) diary.lastCommentTime = diary.date;
                    return diary;
                });
                saveData();
            } else {
                const sampleDiary = {
                    id: Date.now(),
                    content: "欢迎来到AI智能社区！🏠\n\n这里住着5位AI居民，他们会根据你的日记内容生成真正相关的评论。\n\n💡 提示：在顶部配置好 OpenAI API Key，AI 评论就会智能匹配你的心情！\n\n试试写一篇日记吧~",
                    images: [],
                    date: new Date().toISOString(),
                    likes: 0,
                    comments: [],
                    lastCommentTime: new Date().toISOString()
                };
                diaries = [sampleDiary];
                saveData();
            }
            render();
        }

        function saveData() {
            localStorage.setItem('ai_community_diaries_v2', JSON.stringify(diaries));
        }

        // 创建评论记录
        async function createCommentRecord(diaryContent, personalityKey, replyToId = null, parentId = null) {
            const commentData = await generateAIComment(diaryContent, personalityKey);
            return {
                id: Date.now() + Math.random() * 10000,
                text: commentData.text,
                personality: personalityKey,
                authorName: commentData.authorName,
                avatar: commentData.avatar,
                timestamp: new Date().toISOString(),
                replyToId: replyToId,
                parentId: parentId,
                likes: 0
            };
        }

        // 添加新日记
        function addDiary(content) {
            if (!content.trim()) {
                alert('写点什么吧~');
                return;
            }
            
            const newDiary = {
                id: Date.now(),
                content: content.trim(),
                images: [],
                date: new Date().toISOString(),
                likes: 0,
                comments: [],
                lastCommentTime: new Date().toISOString()
            };
            diaries.unshift(newDiary);
            saveData();
            render();
            
            // 新日记发布后，生成1-2条初始评论
            setTimeout(() => generateRandomCommentForDiary(newDiary.id), 2000);
            setTimeout(() => generateRandomCommentForDiary(newDiary.id), 5000);
        }

        // 为指定日记生成一条随机评论
        async function generateRandomCommentForDiary(diaryId) {
            const diary = diaries.find(d => d.id === diaryId);
            if (!diary) return;
            
            // 显示加载状态
            renderWithLoading(diaryId);
            
            let replyToComment = null;
            let parentId = null;
            
            if (diary.comments.length > 0 && Math.random() > 0.5) {
                const possibleReplies = diary.comments.filter(c => !c.replyToId);
                if (possibleReplies.length > 0) {
                    replyToComment = possibleReplies[Math.floor(Math.random() * possibleReplies.length)];
                    parentId = replyToComment.parentId || replyToComment.id;
                }
            }
            
            let personality;
            if (replyToComment) {
                const r = Math.random();
                if (r < 0.3 && replyToComment.personality === 'optimistic') personality = 'cynic';
                else if (r < 0.3 && replyToComment.personality === 'cynic') personality = 'optimistic';
                else if (r < 0.6) personality = 'social';
                else personality = getRandomPersonality();
            } else {
                personality = getRandomPersonality();
            }
            
            const newComment = await createCommentRecord(
                diary.content,
                personality,
                replyToComment ? replyToComment.id : null,
                parentId
            );
            
            diary.comments.push(newComment);
            diary.lastCommentTime = newComment.timestamp;
            saveData();
            render();
            
            // 有概率触发后续回复
            if (Math.random() > 0.8 && diary.comments.length < 100) {
                setTimeout(() => generateRandomCommentForDiary(diaryId), 3000 + Math.random() * 5000);
            }
        }

        function renderWithLoading(diaryId) {
            // 临时显示加载状态
            const diaryCard = document.querySelector(`.diary-card[data-id="${diaryId}"]`);
            if (diaryCard) {
                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'loading-comment';
                loadingDiv.innerHTML = '🤔 AI 正在思考评论...';
                const commentsDiv = diaryCard.querySelector('.comments-tree');
                if (commentsDiv && !commentsDiv.querySelector('.loading-comment')) {
                    commentsDiv.appendChild(loadingDiv);
                    setTimeout(() => {
                        if (loadingDiv.parentNode) loadingDiv.remove();
                    }, 3000);
                }
            }
        }

        function generateRandomComment() {
            if (isPaused || diaries.length === 0) return;
            const sortedDiaries = [...diaries].sort((a, b) => a.comments.length - b.comments.length);
            const targetDiary = sortedDiaries[0];
            if (targetDiary.comments.length < 150) {
                generateRandomCommentForDiary(targetDiary.id);
            }
        }

        function deleteDiary(id) {
            if (confirm('删除日记会同时删除所有AI评论，确定吗？')) {
                diaries = diaries.filter(d => d.id !== id);
                saveData();
                render();
            }
        }

        function likeDiary(id) {
            const diary = diaries.find(d => d.id === id);
            if (diary) {
                diary.likes++;
                saveData();
                render();
            }
        }

        function likeComment(diaryId, commentId) {
            const diary = diaries.find(d => d.id === diaryId);
            if (diary) {
                const comment = diary.comments.find(c => c.id === commentId);
                if (comment) {
                    comment.likes = (comment.likes || 0) + 1;
                    saveData();
                    render();
                }
            }
        }

        function setSpeed(value) {
            speed = value;
            const speedLabel = document.getElementById('speedLabel');
            if (speed < 20) speedLabel.textContent = '缓慢';
            else if (speed < 50) speedLabel.textContent = '中等';
            else if (speed < 80) speedLabel.textContent = '快速';
            else speedLabel.textContent = '热闹';
            
            if (intervalId) {
                clearInterval(intervalId);
                const intervalMs = Math.max(3000, 60000 - (speed * 570));
                intervalId = setInterval(() => generateRandomComment(), intervalMs);
            }
        }

        function startInterval() {
            const intervalMs = Math.max(3000, 60000 - (speed * 570));
            intervalId = setInterval(() => generateRandomComment(), intervalMs);
        }

        // ==================== 渲染 ====================
        function render() {
            document.getElementById('diaryCount').innerText = diaries.length;
            const totalComments = diaries.reduce((sum, d) => sum + d.comments.length, 0);
            document.getElementById('commentCount').innerText = totalComments;
            const totalLikes = diaries.reduce((sum, d) => sum + d.likes, 0);
            document.getElementById('likeCount').innerText = totalLikes;
            
            const diaryList = document.getElementById('diaryList');
            if (diaries.length === 0) {
                diaryList.innerHTML = '<div class="empty-state" style="background:white; border-radius:20px; padding:60px; text-align:center;">📭 还没有日记，写第一篇吧~</div>';
                return;
            }
            
            diaryList.innerHTML = diaries.map(diary => {
                const date = new Date(diary.date);
                const dateStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                
                const topComments = diary.comments.filter(c => !c.replyToId);
                const replies = diary.comments.filter(c => c.replyToId);
                
                function renderCommentTree(comment, depth = 0) {
                    const commentDate = new Date(comment.timestamp);
                    const timeStr = `${commentDate.getHours().toString().padStart(2,'0')}:${commentDate.getMinutes().toString().padStart(2,'0')}`;
                    const personalityInfo = PERSONALITIES[comment.personality] || PERSONALITIES.peaceful;
                    const childReplies = replies.filter(r => r.replyToId === comment.id);
                    
                    return `
                        <div class="comment-item" style="margin-left: ${depth * 20}px">
                            <div class="comment-bubble">
                                <div class="comment-avatar" style="background: ${getPersonalityColor(comment.personality)}20">${comment.avatar}</div>
                                <div class="comment-body">
                                    <div class="comment-name">
                                        ${escapeHtml(comment.authorName)}
                                        <span class="personality-badge" style="background: ${getPersonalityColor(comment.personality)}20; color:${getPersonalityColor(comment.personality)}">${personalityInfo.style}</span>
                                    </div>
                                    <div class="comment-text">${escapeHtml(comment.text)}</div>
                                    <div class="comment-time">${timeStr} · ❤️ ${comment.likes || 0}</div>
                                    <div class="comment-actions">
                                        <button onclick="window.likeComment(${diary.id}, ${comment.id})">👍 点赞</button>
                                        <button onclick="window.replyToComment(${diary.id}, ${comment.id})">💬 回复</button>
                                    </div>
                                </div>
                            </div>
                            ${childReplies.map(child => renderCommentTree(child, depth + 1)).join('')}
                        </div>
                    `;
                }
                
                const commentsHtml = topComments.map(c => renderCommentTree(c)).join('');
                
                return `
                    <div class="diary-card" data-id="${diary.id}">
                        <div class="diary-header">
                            <span>📅 ${dateStr}</span>
                            <button class="delete-btn" onclick="window.deleteDiary(${diary.id})">🗑️</button>
                        </div>
                        <div class="diary-content">${escapeHtml(diary.content)}</div>
                        <div class="like-section">
                            <button class="like-btn" onclick="window.likeDiary(${diary.id})">❤️</button>
                            <span>${diary.likes} 人点赞</span>
                        </div>
                        <div class="comments-tree">
                            <div style="font-size:0.85rem; color:#666; margin-bottom:12px;">💬 ${diary.comments.length} 条评论 ${openAIConfig.enabled ? '🤖 AI智能生成' : '📝 离线模板'}</div>
                            ${commentsHtml || '<div style="color:#999; text-align:center; padding:20px;">✨ AI居民们正在路上，马上就会出现...</div>'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getPersonalityColor(personality) {
            const colors = {
                peaceful: '#4CAF50',
                cynic: '#9C27B0',
                pessimistic: '#2196F3',
                optimistic: '#FF9800',
                social: '#E91E63'
            };
            return colors[personality] || '#667eea';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function replyToComment(diaryId, commentId) {
            const replyText = prompt('AI居民想说：', '');
            if (!replyText) return;
            
            const diary = diaries.find(d => d.id === diaryId);
            if (!diary) return;
            
            const targetComment = diary.comments.find(c => c.id === commentId);
            if (!targetComment) return;
            
            const personality = getRandomPersonality();
            const p = PERSONALITIES[personality];
            
            // 手动回复时，如果是自定义内容，直接使用
            const newComment = {
                id: Date.now() + Math.random() * 10000,
                text: replyText,
                personality: personality,
                authorName: p.name,
                avatar: p.avatar,
                timestamp: new Date().toISOString(),
                replyToId: commentId,
                parentId: targetComment.parentId || targetComment.id,
                likes: 0
            };
            
            diary.comments.push(newComment);
            saveData();
            render();
        }

        // 全局函数
        window.deleteDiary = deleteDiary;
        window.likeDiary = likeDiary;
        window.likeComment = likeComment;
        window.replyToComment = replyToComment;

        // 初始化
        function init() {
            loadAPIConfig();
            loadData();
            
            const speedSlider = document.getElementById('speedSlider');
            const pauseBtn = document.getElementById('pauseBtn');
            const saveApiBtn = document.getElementById('saveApiBtn');
            
            speedSlider.addEventListener('input', (e) => setSpeed(parseInt(e.target.value)));
            pauseBtn.addEventListener('click', () => {
                isPaused = !isPaused;
                pauseBtn.textContent = isPaused ? '▶️ 恢复评论' : '⏸️ 暂停新评论';
            });
            saveApiBtn.addEventListener('click', saveAPIConfig);
            
            document.getElementById('publishBtn').onclick = () => {
                const content = document.getElementById('diaryInput').value;
                addDiary(content);
                document.getElementById('diaryInput').value = '';
            };
            
            setSpeed(speed);
            startInterval();
        }
        
        init();
    </script>
</body>
</html>
